name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check src fhir_validator_agent scripts tests

      - name: Ruff format check
        run: uv run ruff format --check src fhir_validator_agent scripts tests

      - name: Unit tests
        run: uv run pytest tests/ -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Bandit
        run: uv run bandit -r src fhir_validator_agent scripts -ll

      - name: pip-audit
        run: uv run pip-audit .